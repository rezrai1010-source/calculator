<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaFusion Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="display">
                <input type="text" id="display" readonly placeholder="0">
            </div>
            
            <div class="button-group">
                <!-- Row 1: Basic Operations -->
                <button class="btn function-btn" onclick="clearDisplay()">C</button>
                <button class="btn function-btn" onclick="deleteLast()">DEL</button>
                <button class="btn function-btn" onclick="appendOperator('/')">÷</button>
                <button class="btn function-btn" onclick="appendOperator('*')">×</button>
                
                <!-- Row 2: Numbers -->
                <button class="btn number-btn" onclick="appendNumber('7')">7</button>
                <button class="btn number-btn" onclick="appendNumber('8')">8</button>
                <button class="btn number-btn" onclick="appendNumber('9')">9</button>
                <button class="btn function-btn" onclick="appendOperator('-')">−</button>
                
                <!-- Row 3: Numbers -->
                <button class="btn number-btn" onclick="appendNumber('4')">4</button>
                <button class="btn number-btn" onclick="appendNumber('5')">5</button>
                <button class="btn number-btn" onclick="appendNumber('6')">6</button>
                <button class="btn function-btn" onclick="appendOperator('+')">+</button>
                
                <!-- Row 4: Numbers -->
                <button class="btn number-btn" onclick="appendNumber('1')">1</button>
                <button class="btn number-btn" onclick="appendNumber('2')">2</button>
                <button class="btn number-btn" onclick="appendNumber('3')">3</button>
                <button class="btn function-btn" onclick="toggleNegative()">±</button>
                
                <!-- Row 5: Advanced & Operations -->
                <button class="btn number-btn" onclick="appendNumber('0')">0</button>
                <button class="btn number-btn" onclick="appendDecimal()">.</button>
                <button class="btn equals-btn" onclick="calculate()">=</button>
                
                <!-- Advanced Operations Row -->
                <button class="btn advanced-btn" onclick="appendFunction('sqrt(')">√</button>
                <button class="btn advanced-btn" onclick="appendFunction('pow(')">x²</button>
                <button class="btn advanced-btn" onclick="appendFunction('cbrt(')">∛</button>
                <button class="btn advanced-btn" onclick="appendConstant('3.14159')">π</button>
                
                <!-- More Advanced Operations -->
                <button class="btn advanced-btn" onclick="calculatePercentage()">%</button>
                <button class="btn advanced-btn" onclick="appendFunction('sin(')">sin</button>
                <button class="btn advanced-btn" onclick="appendFunction('cos(')">cos</button>
                <button class="btn advanced-btn" onclick="appendFunction('tan(')">tan</button>
                
                <!-- Parentheses & More -->
                <button class="btn advanced-btn" onclick="appendParenthesis('(')">(</button>
                <button class="btn advanced-btn" onclick="appendParenthesis(')')">)</button>
                <button class="btn advanced-btn" onclick="appendFunction('log(')">log</button>
                <button class="btn advanced-btn" onclick="appendConstant('2.71828')">e</button>
            </div>
        </div>
        <div class="info">
            <p>LinguaFusion Calculator</p>
            <p style="font-size: 0.9em; margin-top: 10px;">Supporting Unicode across Latin, Cyrillic & Greek</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
